<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./css/style.css"> 
</head>
<body>

    <div class="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username" oninput="validateInputs()">
        <input type="password" id="password" placeholder="Password" oninput="validateInputs()">
        <button id="loginBtn" onclick="submitForm()" disabled>Login</button>
    </div>

    <script src="./js/app.js"></script> 
</body>
</html>
